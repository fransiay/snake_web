<!doctype html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu du Serpent</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <script src="/_sdk/data_sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .game-font {
            font-family: 'Press Start 2P', monospace;
        }

        .glow {
            text-shadow: 0 0 10px #4ade80, 0 0 20px #4ade80, 0 0 30px #4ade80;
        }

        .snake-segment {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 4px;
            box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .snake-head {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border-radius: 6px;
            box-shadow: 0 0 10px #4ade80;
        }

        .food {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #dc2626);
            border-radius: 50%;
            box-shadow: 0 0 15px #ef4444, inset 0 0 10px rgba(255, 255, 255, 0.3);
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(0.9);
            }

            to {
                transform: scale(1.1);
            }
        }

        .grid-bg {
            background-image:
                linear-gradient(rgba(74, 222, 128, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 222, 128, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .btn-play {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            transition: all 0.3s ease;
        }

        .btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }

        .score-card {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.9) 0%, rgba(20, 20, 20, 0.95) 100%);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
</head>

<body class="h-full bg-gray-950 overflow-auto">
    <div id="app" class="h-full w-full flex flex-col items-center justify-center p-4"><!-- Écran de démarrage -->
        <div id="start-screen" class="text-center">
            <h1 id="game-title" class="game-font text-3xl md:text-4xl text-green-400 glow mb-8">🐍 JEU DU SERPENT</h1>
            <div class="mb-8">
                <p class="text-green-300 mb-4 text-sm">Utilise les flèches ou ZQSD pour diriger le serpent</p>
                <p class="text-green-300 text-sm">Mange les pommes pour grandir !</p>
            </div><button id="start-btn" class="btn-play game-font text-white px-8 py-4 rounded-lg text-sm"> ▶ JOUER
            </button> <!-- Meilleurs scores -->
            <div id="high-scores" class="mt-8 score-card rounded-lg p-4 max-w-xs mx-auto">
                <h3 class="game-font text-green-400 text-xs mb-4">🏆 MEILLEURS SCORES</h3>
                <div id="scores-list" class="text-green-300 text-xs space-y-2">
                    <p class="text-gray-500">Aucun score enregistré</p>
                </div>
            </div>
        </div><!-- Écran de jeu -->
        <div id="game-screen" class="hidden flex flex-col items-center">
            <div class="flex justify-between items-center w-full max-w-md mb-4 px-2">
                <div class="game-font text-green-400 text-sm">
                    SCORE: <span id="current-score" class="text-white">0</span>
                </div>
                <div class="game-font text-green-400 text-sm">
                    RECORD: <span id="high-score" class="text-yellow-400">0</span>
                </div>
            </div>
            <div id="game-board" class="grid-bg border-2 border-green-500 rounded-lg relative"
                style="width: 400px; height: 400px; max-width: 90vw; max-height: 90vw;">
            </div>
            <p class="text-green-300 text-xs mt-4 game-font">ESPACE pour pause</p>
        </div><!-- Écran Game Over -->
        <div id="gameover-screen" class="hidden text-center">
            <h2 class="game-font text-4xl text-red-500 mb-6">💀 GAME OVER</h2>
            <p class="game-font text-green-400 text-lg mb-2">Score final</p>
            <p id="final-score" class="game-font text-5xl text-white mb-8">0</p>
            <div id="save-score-form" class="mb-6"><input type="text" id="player-name" placeholder="Ton nom"
                    maxlength="10"
                    class="game-font text-sm bg-gray-800 border-2 border-green-500 text-white px-4 py-2 rounded-lg w-48 text-center mb-4">
                <br><button id="save-score-btn" class="btn-play game-font text-white px-6 py-2 rounded-lg text-xs"> 💾
                    SAUVEGARDER </button>
            </div><button id="restart-btn" class="btn-play game-font text-white px-8 py-4 rounded-lg text-sm"> 🔄
                REJOUER </button>
        </div>
    </div>
    <script>
        // Configuration par défaut
        const defaultConfig = {
            game_title: "🐍 JEU DU SERPENT",
            background_color: "#030712",
            accent_color: "#4ade80",
            text_color: "#86efac",
            food_color: "#ef4444",
            snake_color: "#22c55e"
        };

        let config = { ...defaultConfig };
        let highScores = [];
        let currentRecordCount = 0;

        // Variables de jeu
        const GRID_SIZE = 20;
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = 0;
        let gameLoop = null;
        let isPaused = false;
        let gameSpeed = 150;
        let boardSize = 400;
        let cellSize = boardSize / GRID_SIZE;

        // Éléments DOM
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const gameBoard = document.getElementById('game-board');
        const currentScoreEl = document.getElementById('current-score');
        const highScoreEl = document.getElementById('high-score');
        const finalScoreEl = document.getElementById('final-score');
        const scoresListEl = document.getElementById('scores-list');
        const gameTitleEl = document.getElementById('game-title');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const saveScoreBtn = document.getElementById('save-score-btn');
        const playerNameInput = document.getElementById('player-name');

        // Gestionnaire de données
        const dataHandler = {
            onDataChanged(data) {
                highScores = data.sort((a, b) => b.score - a.score).slice(0, 5);
                currentRecordCount = data.length;
                updateScoresDisplay();

                if (highScores.length > 0) {
                    highScore = highScores[0].score;
                    highScoreEl.textContent = highScore;
                }
            }
        };

        function updateScoresDisplay() {
            if (highScores.length === 0) {
                scoresListEl.innerHTML = '<p class="text-gray-500">Aucun score enregistré</p>';
                return;
            }

            scoresListEl.innerHTML = highScores.map((s, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '  ';
                return `<div class="flex justify-between"><span>${medal} ${s.player_name || 'Anonyme'}</span><span>${s.score}</span></div>`;
            }).join('');
        }

        // Initialisation du jeu
        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 150;
            isPaused = false;
            currentScoreEl.textContent = score;
            spawnFood();
            render();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
        }

        function render() {
            gameBoard.innerHTML = '';

            // Dessiner la nourriture
            const foodEl = document.createElement('div');
            foodEl.className = 'food absolute';
            foodEl.style.width = `${cellSize - 4}px`;
            foodEl.style.height = `${cellSize - 4}px`;
            foodEl.style.left = `${food.x * cellSize + 2}px`;
            foodEl.style.top = `${food.y * cellSize + 2}px`;
            gameBoard.appendChild(foodEl);

            // Dessiner le serpent
            snake.forEach((segment, index) => {
                const segEl = document.createElement('div');
                segEl.className = index === 0 ? 'snake-head absolute' : 'snake-segment absolute';
                segEl.style.width = `${cellSize - 2}px`;
                segEl.style.height = `${cellSize - 2}px`;
                segEl.style.left = `${segment.x * cellSize + 1}px`;
                segEl.style.top = `${segment.y * cellSize + 1}px`;

                // Yeux sur la tête
                if (index === 0) {
                    segEl.innerHTML = `
            <div class="absolute w-2 h-2 bg-white rounded-full" style="top: 25%; left: 20%;"></div>
            <div class="absolute w-2 h-2 bg-white rounded-full" style="top: 25%; right: 20%;"></div>
            <div class="absolute w-1 h-1 bg-black rounded-full" style="top: 30%; left: 25%;"></div>
            <div class="absolute w-1 h-1 bg-black rounded-full" style="top: 30%; right: 25%;"></div>
          `;
                }

                gameBoard.appendChild(segEl);
            });
        }

        function update() {
            if (isPaused) return;

            direction = { ...nextDirection };

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Collision avec les murs
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // Collision avec soi-même
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Manger la nourriture
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                currentScoreEl.textContent = score;

                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                }

                // Accélérer légèrement
                if (gameSpeed > 80) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }

                spawnFood();
            } else {
                snake.pop();
            }

            render();
        }

        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;

            finalScoreEl.textContent = score;
            gameScreen.classList.add('hidden');
            gameoverScreen.classList.remove('hidden');
            playerNameInput.value = '';
        }

        async function saveScore() {
            const playerName = playerNameInput.value.trim() || 'Anonyme';

            if (currentRecordCount >= 999) {
                // Supprimer le plus ancien si limite atteinte
                const oldest = highScores[highScores.length - 1];
                if (oldest && oldest.__backendId) {
                    await window.dataSdk.delete(oldest);
                }
            }

            saveScoreBtn.disabled = true;
            saveScoreBtn.textContent = '⏳ Sauvegarde...';

            const result = await window.dataSdk.create({
                player_name: playerName,
                score: score,
                date: new Date().toISOString()
            });

            if (result.isOk) {
                saveScoreBtn.textContent = '✅ Sauvegardé !';
            } else {
                saveScoreBtn.textContent = '❌ Erreur';
                saveScoreBtn.disabled = false;
            }
        }

        function showScreen(screen) {
            startScreen.classList.add('hidden');
            gameScreen.classList.add('hidden');
            gameoverScreen.classList.add('hidden');
            screen.classList.remove('hidden');
        }

        function startGame() {
            showScreen(gameScreen);
            initGame();
            gameLoop = setInterval(update, gameSpeed);
        }

        // Contrôles
        document.addEventListener('keydown', (e) => {
            // Empêcher le défilement
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }

            if (e.code === 'Space') {
                if (gameLoop) {
                    isPaused = !isPaused;
                } else if (!startScreen.classList.contains('hidden')) {
                    startGame();
                }
                return;
            }

            const keyMap = {
                'ArrowUp': { x: 0, y: -1 },
                'ArrowDown': { x: 0, y: 1 },
                'ArrowLeft': { x: -1, y: 0 },
                'ArrowRight': { x: 1, y: 0 },
                'KeyZ': { x: 0, y: -1 },
                'KeyS': { x: 0, y: 1 },
                'KeyQ': { x: -1, y: 0 },
                'KeyD': { x: 1, y: 0 },
                'KeyW': { x: 0, y: -1 },
                'KeyA': { x: -1, y: 0 }
            };

            const newDir = keyMap[e.code];
            if (newDir && (newDir.x !== -direction.x || newDir.y !== -direction.y)) {
                nextDirection = newDir;
            }
        });

        // Contrôles tactiles
        let touchStartX = 0;
        let touchStartY = 0;

        gameBoard.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        gameBoard.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < -30 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 30 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < -30 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        }, { passive: true });

        // Event listeners
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', () => {
            showScreen(startScreen);
            saveScoreBtn.disabled = false;
            saveScoreBtn.textContent = '💾 SAUVEGARDER';
        });
        saveScoreBtn.addEventListener('click', saveScore);

        // Element SDK
        async function onConfigChange(cfg) {
            config = { ...defaultConfig, ...cfg };
            gameTitleEl.textContent = config.game_title || defaultConfig.game_title;
        }

        function mapToCapabilities(cfg) {
            return {
                recolorables: [
                    {
                        get: () => cfg.accent_color || defaultConfig.accent_color,
                        set: (v) => { cfg.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
                    }
                ],
                borderables: [],
                fontEditable: undefined,
                fontSizeable: undefined
            };
        }

        function mapToEditPanelValues(cfg) {
            return new Map([
                ["game_title", cfg.game_title || defaultConfig.game_title]
            ]);
        }

        // Initialisation
        async function init() {
            // Adapter la taille du plateau
            const maxSize = Math.min(window.innerWidth * 0.9, 400);
            boardSize = Math.floor(maxSize / GRID_SIZE) * GRID_SIZE;
            cellSize = boardSize / GRID_SIZE;
            gameBoard.style.width = `${boardSize}px`;
            gameBoard.style.height = `${boardSize}px`;

            if (window.elementSdk) {
                window.elementSdk.init({
                    defaultConfig,
                    onConfigChange,
                    mapToCapabilities,
                    mapToEditPanelValues
                });
            }

            if (window.dataSdk) {
                await window.dataSdk.init(dataHandler);
            }
        }

        init();
    </script>

</body>
